<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>CRAFTIXMC.PL – REKRUTACJA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffd6e0, #d6f0ff, #e6d6ff);
      color: #333;
    }

    header {
      text-align: center;
      padding: 30px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    nav button {
      background: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    nav button:hover {
      background: #eee;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.8);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      animation: fadeIn 0.5s ease;
    }

    input, textarea, select {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button.submit {
      background: linear-gradient(45deg, #ff9ecf, #9edfff);
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button.submit:hover {
      filter: brightness(1.1);
    }

    .hidden {
      display: none;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 0.8rem;
      color: white;
    }

    .pending { background: orange; }
    .accepted { background: green; }
    .rejected { background: red; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<header>
  <h1>CRAFTIXMC.PL</h1>
  <p>Rekrutacja na serwer</p>

  <nav>
    <button onclick="showTab('form')">Rekrutacja</button>
    <button onclick="showTab('list')">Zgłoszenia</button>
    <button onclick="showTab('accepted')">Zakończona</button>
  </nav>
</header>

<div class="container">

  <!-- FORM -->
  <div id="form" class="card">
    <h2>Formularz rekrutacyjny</h2>

    <input type="email" id="email" placeholder="📧 Gmail" required>
    <input type="text" id="nick" placeholder="🎮 Nick Minecraft">
    <input type="text" id="discord" placeholder="💬 Discord (np. user#1234)">
    <input type="text" id="time" placeholder="⏱️ Czas gry (godziny)">
    <textarea id="reason" placeholder="📝 Dlaczego chcesz dołączyć?"></textarea>

    <button class="submit" onclick="submitForm()">Wyślij zgłoszenie</button>
  </div>

  <!-- LIST -->
  <div id="list" class="hidden"></div>

  <!-- ACCEPTED -->
  <div id="accepted" class="hidden"></div>

</div>

<script>
function showTab(tab) {
  document.getElementById('form').classList.add('hidden');
  document.getElementById('list').classList.add('hidden');
  document.getElementById('accepted').classList.add('hidden');

  document.getElementById(tab).classList.remove('hidden');

  render();
}

function getData() {
  return JSON.parse(localStorage.getItem('apps') || "[]");
}

function saveData(data) {
  localStorage.setItem('apps', JSON.stringify(data));
}

function submitForm() {
  const data = getData();

  data.push({
    email: document.getElementById('email').value,
    nick: document.getElementById('nick').value,
    discord: document.getElementById('discord').value,
    time: document.getElementById('time').value,
    reason: document.getElementById('reason').value,
    status: "pending"
  });

  saveData(data);
  alert("Zgłoszenie wysłane!");
  render();
}

function render() {
  const data = getData();

  const listDiv = document.getElementById('list');
  listDiv.innerHTML = "<h2>Zgłoszenia</h2>";

  const acceptedDiv = document.getElementById('accepted');
  acceptedDiv.innerHTML = "<h2>Zakończona rekrutacja</h2>";

  data.forEach((app, i) => {
    const el = document.createElement('div');
    el.className = "card";

    el.innerHTML = `
      <strong>${app.nick}</strong><br>
      Discord: ${app.discord}<br>
      Status: <span class="badge ${app.status}">${app.status}</span><br><br>
      <button onclick="setStatus(${i}, 'accepted')">✔ Przyjmij</button>
      <button onclick="setStatus(${i}, 'rejected')">✖ Odrzuć</button>
    `;

    if (app.status === "accepted") {
      acceptedDiv.appendChild(el);
    } else {
      listDiv.appendChild(el);
    }
  });
}

function setStatus(i, status) {
  const data = getData();
  data[i].status = status;
  saveData(data);
  render();
}

render();
</script>

</body>
</html>
